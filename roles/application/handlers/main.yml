---
- name: restart uvicorn
  when: 
    - uvicorn is defined
    - item.remove|d(False) == False
  become: yes
  supervisorctl: >
    name={{ project_name }}-{{ item.name }}-uvicorn:
    state=restarted
  with_items: "{{ uvicorn }}"

- name: verify uvicorn health
  when:
    - uvicorn is defined
    - item.health_check | default(false) | bool
    - item.remove | default(false) == False
  ansible.builtin.uri:
    url: "http://{{ item.host }}:{{ item.port }}{{ item.health_check_path | default(uvicorn_health_check_path) }}"
    status_code: "{{ item.health_check_expected_status | default(uvicorn_health_check_expected_status) }}"
    validate_certs: "{{ item.health_check_validate_certs | default(uvicorn_health_check_validate_certs) }}"
    timeout: "{{ item.health_check_timeout | default(uvicorn_health_check_timeout) }}"
  register: uvicorn_health_result
  retries: "{{ item.health_check_retries | default(uvicorn_health_check_retries) }}"
  delay: "{{ item.health_check_delay | default(uvicorn_health_check_delay) }}"
  until: uvicorn_health_result is succeeded
  with_items: "{{ uvicorn }}"
  loop_control:
    label: "{{ item.name }}"

- name: restart celery workers
  when: 
    - celery.workers is defined
    - item.remove|d(False) == False
  become: yes
  supervisorctl: >
    name={{ project_name }}-{{ item.node_name }}
    state=restarted
  with_items: "{{ celery.workers }}"

- name: Run custom django startup management commands 
  when:
    - django is defined
    - django_commands.start_commands is defined
  become_user: "{{ project_user }}"
  django_manage: >
    command={{ item }}
    app_path={{ app_working_dir }}
    settings={{ django.settings }}
    virtualenv={{ virtualenv }}
  with_items: "{{ django_commands.start_commands }}"
  environment: "{{ dot_env }}"
  listen: "restart app"
  tags:
    - deploy
    - start
    - restart